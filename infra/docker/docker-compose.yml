services:
  # ============================
  # Base de datos
  # ============================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: eval-postgres
    environment:
      POSTGRES_DB: evaluaciones_docentes
      POSTGRES_USER: ${POSTGRES_USER:-eval_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eval_pass_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eval_user} -d evaluaciones_docentes"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================
  # Redis (broker para Celery)
  # ============================
  redis:
    image: redis:7-alpine
    container_name: eval-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================
  # MinIO (almacenamiento de PDFs)
  # ============================
  minio:
    image: minio/minio:latest
    container_name: eval-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_pass_dev}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================
  # Backend (FastAPI)
  # ============================
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: eval-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eval_user}:${POSTGRES_PASSWORD:-eval_pass_dev}@postgres:5432/evaluaciones_docentes
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_pass_dev}
      MINIO_BUCKET: evaluaciones
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ============================
  # Celery Worker
  # ============================
  celery-worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: eval-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eval_user}:${POSTGRES_PASSWORD:-eval_pass_dev}@postgres:5432/evaluaciones_docentes
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_pass_dev}
      MINIO_BUCKET: evaluaciones
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================
  # Frontend (Next.js)
  # ============================
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: eval-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
